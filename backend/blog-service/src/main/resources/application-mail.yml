spring:
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_local_mail@example.com}
    password: ${MAIL_PASSWORD:your_local_mail_auth_code}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
