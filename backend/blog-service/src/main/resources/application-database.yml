# ============================================================================
# 数据库、持久层、多媒体上传与安全认证配置 (分离自 application.yml)
# ============================================================================

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/butvan_blog}
    username: ${SPRING_DATASOURCE_USERNAME:butvan}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1.0
    locations: classpath:db/migration
    placeholder-replacement: false


  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:butvan_blog_super_safe_secret_key_designed_with_at_least_256_bits_for_security_compliance}
  expiration: 604800  # Token 有效期：7天（单位：秒）

blog:
  database:
    seeding:
      enabled: ${DATABASE_SEEDING_ENABLED:false}

