# ============================================================================
# Redis 缓存与分布式会话配置 (分离自 application.yml)
# ============================================================================

spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
